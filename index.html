<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraria 像素結晶智慧導航站</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Terraria 導航站">

    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlRlcnJhcmlhIO像素結晶智慧導航站IiwKICAic2hvcnRfbmFtZSI6ICJUZXJyYXJpYSDlsI7om68iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzA5MGExNCIsCiAgInRoZW1lX2NvbG9yIjogIiMwMGU1ZmYiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJkYXRhOmltYWdlL3N2Zyt4bWw7YmFzZTY0LFBITjJkeTF3YVhKbFpYTWdaMmh5YVdkbGN5QnpkR0Z5ZENCemFXNWxPaUJtYjNKdFlXMXpPaUIwYUdWeVpYTWdZMjlzYjNJOklmMXdaR1VpSUR4d2NtOTFjbVFnZEdobGJXVWlJRzE1WDJOdmJHOXlPaU13TURlMWRtWWlJSFpwWlhka2FHOXlPaU13TURlMWRtWWlJRzFwYm1SMWJpSWdabWxzYkhNaUl6QXdOV1ptSWlCamIyeHZjaUlnTXpBZ016QWdNe0FpTURBZ016QWlJSFpwWlhjdUlpaHpaV05vYjI0aUl6QXdOV1ptSWlCNkptMXdaR1VpUGpvPSIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2Uvc3ZnK3htbCIKICAgIH0KICBdCn0=">

    <style>
        :root {
            --bg-dark: #090a14;
            --pixel-size: 4px;
            --color-mana: #00e5ff;       
            --color-life: #ff2a6d;       
            --color-chlorophyte: #00ff66; 
            --color-hallow: #ffbe0b;      
            --color-calamity: #ff4500;   
            --card-border-retro: #222533;
            --text-primary: #ffffff;
            --text-secondary: #718096;
            --font-pixel: "Segoe UI", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(157, 78, 221, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #090a14 0%, #05060b 100__);
            color: var(--text-primary);
            font-family: var(--font-pixel);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: row; 
            overflow: hidden;
            position: relative;
            line-height: 1.6;
            letter-spacing: 0.05em;
        }

        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .pixel-soul {
            position: absolute;
            width: 6px;
            height: 6px;
            opacity: 0.6;
            bottom: -20px;
            animation: soulFloat 15s infinite linear;
        }

        @keyframes soulFloat {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        .left-panel {
            width: 45%;
            min-width: 450px;
            height: 100vh;
            box-sizing: border-box;
            padding: 40px;
            overflow-y: auto;
            z-index: 10;
            border-right: 4px solid #1a1d30;
            background: rgba(9, 10, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .mode-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            font-family: var(--font-pixel);
            font-weight: 800;
            font-size: 0.9rem;
            color: #5a6578;
            background: #111424;
            border: 2px solid #2d3454;
            cursor: pointer;
            border-radius: 2px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .mode-btn.active-vanilla {
            color: #ffffff;
            background: #0d253f;
            border-color: var(--color-mana);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .mode-btn.active-calamity {
            color: #ffffff;
            background: #3f1911;
            border-color: var(--color-calamity);
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.3);
        }

        .pixel-title {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 14px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 20%, var(--color-mana) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px #0c0d1a);
        }

        .pixel-subtitle {
            font-size: 1rem;
            color: #b0bfc1;
            letter-spacing: 5px;
            margin: 15px 0 35px 0;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pixel-subtitle::after {
            content: "";
            flex-grow: 1;
            height: 4px;
            background: linear-gradient(90deg, var(--color-chlorophyte), transparent);
            box-shadow: 0 0 10px var(--color-chlorophyte);
        }

        /* 調整搜尋區域排版以容納傳送按鈕 */
        .search-control-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-pixel-box {
            flex-grow: 1;
            position: relative;
            background: linear-gradient(135deg, #12162b 0%, #0c0e1a 100__);
            border: 4px solid #ffffff;
            box-shadow: 0 0 0 4px #1a1d30;
            border-radius: 4px;
            transition: all 0.25s ease;
        }

        .search-pixel-input {
            width: 100%;
            box-sizing: border-box;
            padding: 16px 20px;
            font-size: 1.15rem;
            font-family: var(--font-pixel);
            background: transparent;
            border: none;
            color: #ffffff;
            outline: none;
        }

        .teleport-action-btn {
            padding: 0 24px;
            font-family: var(--font-pixel);
            font-weight: 900;
            font-size: 1.1rem;
            background: #111424;
            color: var(--color-mana);
            border: 4px solid var(--color-mana);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .teleport-action-btn:hover {
            background: var(--color-mana);
            color: #000000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        .game-status-panel {
            font-size: 0.9rem;
            color: var(--color-hallow);
            margin-bottom: 30px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
        }

        .game-status-panel::before {
            content: "●";
            color: var(--color-chlorophyte);
            animation: blink 1s infinite alternate;
        }

        @keyframes blink { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .pixel-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .pixel-card {
            background: linear-gradient(135deg, #151a36 0%, #0e1124 100__);
            border: 3px solid #2d3454;
            box-shadow: 5px 5px 0px #05060b;
            padding: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.2s ease;
        }

        .pixel-card:hover {
            transform: translateY(-4px);
            border-color: var(--color-chlorophyte);
            box-shadow: 7px 7px 0px #020305;
        }

        .card-rarity-indicator {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 12px;
            height: 12px;
        }

        .card-meta-info {
            font-size: 0.75rem;
            font-weight: 700;
            color: #5a6578;
            margin-bottom: 10px;
        }

        .card-item-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 10px 0;
        }

        .card-item-desc {
            font-size: 0.9rem;
            color: #a0aec0;
            margin: 0;
        }

        .right-panel {
            width: 55%;
            height: 100vh;
            position: relative;
            background: #090a12;
            box-shadow: inset 12px 0 40px rgba(0,0,0,0.7);
            z-index: 5;
        }

        .teleport-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4a5568;
            font-weight: 700;
            z-index: 2;
            background: #0d0f1d;
            transition: opacity 0.5s ease;
        }

        .teleport-icon {
            font-size: 4rem;
            color: var(--color-mana);
            margin-bottom: 20px;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow { 0% { opacity: 0.3; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1.05); } }

        .wiki-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.4s ease;
        }

        .viewport-active { opacity: 1; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .left-panel { width: 100%; min-width: 100%; height: 50vh; padding: 24px; border-right: none; border-bottom: 4px solid #1a1d30; }
            .pixel-title { font-size: 2.8rem; text-align: center; }
            .pixel-subtitle { font-size: 0.9rem; justify-content: center; }
            .pixel-subtitle::after { display: none; }
            .search-control-group { flex-direction: column; gap: 8px; margin-bottom: 16px; }
            .teleport-action-btn { padding: 12px; font-size: 1rem; }
            .right-panel { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body>

    <div class="particle-container" id="soulParticles"></div>
    <div class="left-panel">
        
        <div class="mode-switcher">
            <button id="btnVanilla" class="mode-btn active-vanilla" onclick="switchMode('vanilla')">VANILLA 原版模式</button>
            <button id="btnCalamity" class="mode-btn" onclick="switchMode('calamity')">CALAMITY 災厄模式</button>
        </div>

        <h1 class="pixel-title" id="mainTitle">Terraria</h1>
        <div class="pixel-subtitle" id="mainSubtitle">官方資料庫 · 即時觀測雷達</div>
        
        <div class="search-control-group">
            <div class="search-pixel-box" id="searchBoxOuter">
                <input type="text" id="wikiSearchInput" class="search-pixel-input" placeholder="請輸入原版武器、王怪、配方名稱..." onkeydown="handleKeyDown(event)">
            </div>
            <button id="btnAction" class="teleport-action-btn" onclick="executeDirectSearch()">傳送觀測</button>
        </div>

        <div class="game-status-panel" id="statusMessage">READY: 輸入關鍵字後按下 Enter 或傳送觀測...</div>

        <div class="pixel-grid" id="resultsGrid"></div>
    </div>

    <div class="right-panel">
        <div class="teleport-placeholder" id="teleportPlaceholder">
            <div class="teleport-icon" id="portalIcon">🌀</div>
            <div id="placeholderText">等待數據傳送中...請在左側輸入並點擊傳送</div>
        </div>
        <iframe id="wikiFrame" class="wiki-viewport" title="Terraria Wiki Viewport"></iframe>
    </div>

    <script>
        const CONFIG = {
            vanilla: {
                api: "https://terraria.wiki.gg/zh/api.php",
                base: "https://terraria.wiki.gg/zh/wiki/",
                title: "Terraria",
                subtitle: "官方資料庫 · 即時觀測雷達",
                placeholder: "請輸入原版武器、王怪、配方名稱...",
                color: "#00e5ff"
            },
            calamity: {
                base: "https://calamitymod.wiki.gg/zh/wiki/",
                title: "Calamity",
                subtitle: "災厄擴充庫 · 世界線觀測鏡",
                placeholder: "輸入災厄道具名稱 (直接 Enter 傳送)...",
                color: "#ff4500"
            }
        };

        let currentMode = "vanilla";
        const VARIANT = "?variant=zh-tw"; 

        function switchMode(mode) {
            currentMode = mode;
            const cfg = CONFIG[mode];
            
            document.getElementById('btnVanilla').className = `mode-btn ${mode === 'vanilla' ? 'active-vanilla' : ''}`;
            document.getElementById('btnCalamity').className = `mode-btn ${mode === 'calamity' ? 'active-calamity' : ''}`;
            
            document.getElementById('mainTitle').innerText = cfg.title;
            document.getElementById('mainTitle').style.background = `linear-gradient(to bottom, #ffffff 20%, ${cfg.color} 90%)`;
            document.getElementById('mainTitle').style.webkitBackgroundClip = "text";
            document.getElementById('mainSubtitle').innerText = cfg.subtitle;
            document.getElementById('portalIcon').style.color = cfg.color;
            
            const searchBoxOuter = document.getElementById('searchBoxOuter');
            searchBoxOuter.style.borderColor = cfg.color;
            
            const btnAction = document.getElementById('btnAction');
            btnAction.style.borderColor = cfg.color;
            btnAction.style.color = cfg.color;
            
            const input = document.getElementById('wikiSearchInput');
            input.placeholder = cfg.placeholder;
            input.value = "";
            
            document.getElementById('resultsGrid').innerHTML = '';
            
            if (mode === 'calamity') {
                document.getElementById('statusMessage').innerText = "CALAMITY MODE: 避開跨網域限制，請直接打字並點擊「傳送觀測」直擊資料庫。";
            } else {
                document.getElementById('statusMessage').innerText = "READY: 請輸入關鍵字以傳送官方數據...";
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                executeDirectSearch();
            }
        }

        // ⚡ 繞過 CORS 核心：直接生成特殊搜尋網址，完美相容原版與災厄
        function executeDirectSearch() {
            const query = document.getElementById('wikiSearchInput').value.trim();
            if (!query) return;

            const cfg = CONFIG[currentMode];
            document.getElementById('statusMessage').innerText = `CONNECTING: 正在直導 ${currentMode === 'vanilla' ? '原版' : '災厄'} Wiki 智慧引擎...`;
            
            // 將空格替換為維基專用底線並進行編碼
            const formattedQuery = encodeURIComponent(query.replace(/\s+/g, '_'));
            
            // 使用 Special:Search 搜尋直達協議，若名稱百分之百精準會直接進條目；若不精準則呈現搜尋結果清單
            const targetUrl = `${cfg.base}Special:Search?search=${formattedQuery}${VARIANT.replace('?', '&')}`;
            
            teleportToViewport(targetUrl, query);
            
            // 如果是原版，順便嘗試在左側撈取快速清單
            if (currentMode === 'vanilla') {
                fetchVanillaListData(query);
            }
        }

        // 僅供原版使用的快速下拉清單撈取
        async function fetchVanillaListData(query) {
            const params = new URLSearchParams({ action: "opensearch", profile: "engine_autoselect", search: query, limit: "5", format: "json", origin: "*" });
            try {
                const response = await fetch(`${CONFIG.vanilla.api}?${params.toString()}`);
                if (response.ok) {
                    const data = await response.json();
                    renderVanillaResults(data[1] || [], data[3] || []);
                }
            } catch (e) {
                // 原版若失敗不影響右側觀測鏡運作
            }
        }

        function renderVanillaResults(titles, links) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            titles.forEach((title, index) => {
                const originUrl = links[index];
                const pageName = originUrl.substring(originUrl.lastIndexOf('/') + 1);
                const targetUrl = `${CONFIG.vanilla.base}${pageName}${VARIANT}`;
                
                const card = document.createElement('div');
                card.className = 'pixel-card';
                card.innerHTML = `
                    <div class="card-rarity-indicator" style="background: var(--color-mana); box-shadow: 0 0 8px var(--color-mana);"></div>
                    <div class="card-meta-info">VANILLA ENTRY // 0${index + 1}</div>
                    <h3 class="card-item-title">${title}</h3>
                    <p class="card-item-desc">點擊就地鎖定「${title}」的詳細合成面板。</p>
                `;
                card.onclick = () => teleportToViewport(targetUrl, title);
                grid.appendChild(card);
            });
        }

        function teleportToViewport(url, title) {
            const frame = document.getElementById('wikiFrame');
            const placeholder = document.getElementById('teleportPlaceholder');
            const placeholderText = document.getElementById('placeholderText');
            frame.classList.remove('viewport-active');
            placeholder.style.pointerEvents = 'auto';
            placeholder.style.opacity = '1';
            placeholderText.innerText = `⚡ 正在同步「${title}」的世界線數據並強制繁體化...`;
            
            frame.onload = function() {
                placeholder.style.opacity = '0';
                placeholder.style.pointerEvents = 'none';
                frame.classList.add('viewport-active'); 
                document.getElementById('statusMessage').innerText = `VIEWING: 目前正在瀏覽「${title}」的官方維基鏡像`;
            };
            frame.src = url;
            if (window.innerWidth <= 768) {
                setTimeout(() => { document.querySelector('.right-panel').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50);
            }
        }

        function initBackgroundParticles() {
            const container = document.getElementById('soulParticles');
            const colors = ['#00e5ff', '#ff2a6d', '#00ff66', '#ff4500'];
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.floor(Math.random() * 5) + 3;
                particle.className = 'pixel-soul';
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.background = randomColor;
                particle.style.boxShadow = `0 0 10px ${randomColor}`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                particle.style.animationDelay = `${Math.random() * -20}s`;
                container.appendChild(particle);
            }
        }

        window.onload = function() { initBackgroundParticles(); };
    </script>
</body>
</html>
