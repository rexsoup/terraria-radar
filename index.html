<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraria 像素結晶智慧導航站</title>
    <style>
        :root {
            --bg-dark: #090a14;
            --color-mana: #00e5ff;       
            --color-chlorophyte: #00ff66; 
            --color-hallow: #ffbe0b;      
            --color-calamity: #ff4500;   
            --text-primary: #ffffff;
            --font-pixel: "Segoe UI", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 69, 0, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, #090a14 0%, #05060b 100__);
            color: var(--text-primary);
            font-family: var(--font-pixel);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: row; 
            overflow: hidden;
            position: relative;
            line-height: 1.6;
            letter-spacing: 0.05em;
        }

        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .pixel-soul {
            position: absolute;
            width: 5px;
            height: 5px;
            opacity: 0.4;
            bottom: -20px;
            animation: soulFloat 15s infinite linear;
        }

        @keyframes soulFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) translateX(80px); opacity: 0; }
        }

        .left-panel {
            width: 45%;
            min-width: 420px;
            height: 100vh;
            box-sizing: border-box;
            padding: 40px;
            overflow-y: auto;
            z-index: 10;
            border-right: 4px solid #1a1d30;
            background: rgba(9, 10, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .mode-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            font-family: var(--font-pixel);
            font-weight: 800;
            font-size: 0.9rem;
            color: #5a6578;
            background: #111424;
            border: 2px solid #2d3454;
            cursor: pointer;
            border-radius: 2px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .mode-btn.active-vanilla {
            color: #ffffff;
            background: #0d253f;
            border-color: var(--color-mana);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .mode-btn.active-calamity {
            color: #ffffff;
            background: #3f1911;
            border-color: var(--color-calamity);
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.3);
        }

        .pixel-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 10px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 20%, var(--color-mana) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px #0c0d1a);
        }

        .pixel-subtitle {
            font-size: 0.95rem;
            color: #b0bfc1;
            letter-spacing: 4px;
            margin: 15px 0 35px 0;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pixel-subtitle::after {
            content: "";
            flex-grow: 1;
            height: 4px;
            background: linear-gradient(90deg, var(--color-chlorophyte), transparent);
            box-shadow: 0 0 10px var(--color-chlorophyte);
        }

        .search-control-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-pixel-box {
            flex-grow: 1;
            background: linear-gradient(135deg, #12162b 0%, #0c0e1a 100__);
            border: 4px solid var(--color-mana);
            box-shadow: 0 0 0 4px #1a1d30;
            border-radius: 4px;
        }

        .search-pixel-input {
            width: 100%;
            box-sizing: border-box;
            padding: 16px 20px;
            font-size: 1.15rem;
            font-family: var(--font-pixel);
            background: transparent;
            border: none;
            color: #ffffff;
            outline: none;
        }

        .teleport-action-btn {
            padding: 0 24px;
            font-family: var(--font-pixel);
            font-weight: 900;
            font-size: 1.1rem;
            background: #111424;
            color: var(--color-mana);
            border: 4px solid var(--color-mana);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .teleport-action-btn:hover {
            background: var(--color-mana);
            color: #000000;
        }

        .game-status-panel {
            font-size: 0.9rem;
            color: var(--color-hallow);
            margin-bottom: 30px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
        }

        .game-status-panel::before {
            content: "●";
            color: var(--color-chlorophyte);
            animation: blink 1s infinite alternate;
        }

        @keyframes blink { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .tips-box {
            background: rgba(26, 29, 48, 0.5);
            border-left: 4px solid var(--color-hallow);
            padding: 20px;
            font-size: 0.95rem;
            color: #a0aec0;
            border-radius: 2px;
        }

        .right-panel {
            width: 55%;
            height: 100vh;
            position: relative;
            background: #090a12;
            box-shadow: inset 12px 0 40px rgba(0,0,0,0.7);
            z-index: 5;
        }

        .teleport-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4a5568;
            font-weight: 700;
            z-index: 2;
            background: #0d0f1d;
            transition: opacity 0.4s ease;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .teleport-icon {
            font-size: 4rem;
            color: var(--color-mana);
            margin-bottom: 20px;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow { 0% { opacity: 0.3; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1.05); } }

        .wiki-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        .viewport-active { opacity: 1; }

        /* 📱 行動裝置完美響應式斷點設定 */
        @media (max-width: 992px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
            }
            .left-panel {
                width: 100%;
                min-width: 100%;
                height: auto;
                padding: 30px 20px;
                border-right: none;
                border-bottom: 4px solid #1a1d30;
            }
            .right-panel {
                width: 100%;
                height: 70vh;
            }
            .pixel-title {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="particle-container" id="soulParticles"></div>
    <div class="left-panel">
        
        <div class="mode-switcher">
            <button id="btnVanilla" class="mode-btn active-vanilla" onclick="switchMode('vanilla')">VANILLA 原版模式</button>
            <button id="btnCalamity" class="mode-btn" onclick="switchMode('calamity')">CALAMITY 灰機災厄</button>
        </div>

        <h1 class="pixel-title" id="mainTitle">Terraria</h1>
        <div class="pixel-subtitle" id="mainSubtitle">官方資料庫 · 即時觀測雷達</div>
        
        <div class="search-control-group">
            <div class="search-pixel-box" id="searchBoxOuter">
                <input type="text" id="wikiSearchInput" class="search-pixel-input" placeholder="請輸入原版武器、王怪、配方..." onkeydown="handleKeyDown(event)">
            </div>
            <button id="btnAction" class="teleport-action-btn" onclick="executeDirectSearch()">傳送觀測</button>
        </div>

        <div class="game-status-panel" id="statusMessage">READY: 輸入關鍵字後按下 Enter 或點擊傳送...</div>

        <div class="tips-box">
            <p style="margin-top:0; color:#fff; font-weight:800;">💡 智慧導航終極協議：</p>
            1. **原版模式**：100% 強制繁體化，搜尋結果直接在右側（或手機下方）無痛看。<br><br>
            2. **灰機災厄模式**：對接官方開放檢索鏈結，送出後自動調用灰機伺服器核心直擊道具正文，手機電腦均完美相容。
        </div>
    </div>

    <div class="right-panel">
        <div class="teleport-placeholder" id="teleportPlaceholder">
            <div class="teleport-icon" id="portalIcon">🌀</div>
            <div id="placeholderText">等待數據傳送中...請在左側輸入並點擊傳送</div>
        </div>
        <iframe id="wikiFrame" class="wiki-viewport" title="Terraria Wiki Viewport"></iframe>
    </div>

    <script {nonce}>
        // 核心設定完全物理隔離，確保互不干擾
        const CONFIG = {
            vanilla: {
                title: "Terraria",
                subtitle: "官方資料庫 · 即時觀測雷達",
                placeholder: "請輸入原版武器、王怪、配方...",
                color: "#00e5ff"
            },
            calamity: {
                title: "Calamity",
                subtitle: "灰機擴充庫 · 官方直達雷達",
                placeholder: "輸入災厄道具、Boss、材料...",
                color: "#ff4500"
            }
        };

        let currentMode = "vanilla";

        function switchMode(mode) {
            currentMode = mode;
            const cfg = CONFIG[mode];
            
            document.getElementById('btnVanilla').className = `mode-btn ${mode === 'vanilla' ? 'active-vanilla' : ''}`;
            document.getElementById('btnCalamity').className = `mode-btn ${mode === 'calamity' ? 'active-calamity' : ''}`;
            
            document.getElementById('mainTitle').innerText = cfg.title;
            document.getElementById('mainTitle').style.background = `linear-gradient(to bottom, #ffffff 20%, ${cfg.color} 90%)`;
            document.getElementById('mainTitle').style.webkitBackgroundClip = "text";
            document.getElementById('mainSubtitle').innerText = cfg.subtitle;
            document.getElementById('portalIcon').style.color = cfg.color;
            
            document.getElementById('searchBoxOuter').style.borderColor = cfg.color;
            
            const btnAction = document.getElementById('btnAction');
            btnAction.style.borderColor = cfg.color;
            btnAction.style.color = cfg.color;
            
            const input = document.getElementById('wikiSearchInput');
            input.placeholder = cfg.placeholder;
            input.value = "";
            
            const frame = document.getElementById('wikiFrame');
            const placeholder = document.getElementById('teleportPlaceholder');
            const placeholderText = document.getElementById('placeholderText');
            
            if (mode === 'calamity') {
                frame.classList.remove('viewport-active');
                frame.src = "";
                placeholder.style.opacity = '1';
                placeholderText.innerHTML = `🔥 灰機直達協議已就緒：<br><br>左側輸入道具後送出，將直接交由灰機核心檢索，一秒直達專頁正片！`;
                document.getElementById('statusMessage').innerText = "CALAMITY MODE: 官方開放式分流就緒。";
            } else {
                frame.classList.remove('viewport-active');
                placeholder.style.opacity = '1';
                placeholderText.innerText = "等待數據傳送中...請在左側輸入並點擊傳送";
                document.getElementById('statusMessage').innerText = "READY: 請輸入關鍵字以傳送官方數據...";
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                executeDirectSearch();
            }
        }

        function executeDirectSearch() {
            const query = document.getElementById('wikiSearchInput').value.trim();
            if (!query) return;

            if (currentMode === 'calamity') {
                // ⚡ 灰機維基標準外掛式檢索窗口（完全不帶 Special:Search，100% 繞過 Google 與高級搜尋死胡同）
                const targetUrl = `https://calamity.huijiwiki.com/index.php?search=${encodeURIComponent(query)}`;
                document.getElementById('statusMessage').innerText = `LAUNCH: 已交由灰機核心載入「${query}」數據專頁。`;
                window.open(targetUrl, '_blank');
            } else {
                // ⚡ 原版模式：獨立封裝，強制使用官方 zh-tw 繁體化設定，絕不跑板
                const targetUrl = `https://terraria.wiki.gg/zh/wiki/Special:Search?search=${encodeURIComponent(query.replace(/\s+/g, '_'))}&variant=zh-tw`;
                document.getElementById('statusMessage').innerText = `TRANSMITTING: 正在將「${query}」送往右側觀測鏡...`;
                teleportToViewport(targetUrl, query);
            }
        }

        function teleportToViewport(url, title) {
            const frame = document.getElementById('wikiFrame');
            const placeholder = document.getElementById('teleportPlaceholder');
            const placeholderText = document.getElementById('placeholderText');
            
            frame.classList.remove('viewport-active');
            placeholder.style.pointerEvents = 'auto';
            placeholder.style.opacity = '1';
            placeholderText.innerText = `⚡ 正在傳送「${title}」數據並執行前端繁體化化渲染...`;
            
            frame.onload = function() {
                placeholder.style.opacity = '0';
                placeholder.style.pointerEvents = 'none';
                frame.classList.add('viewport-active'); 
                document.getElementById('statusMessage').innerText = `VIEWING: 目前正在瀏覽「${title}」的官方繁體維基`;
            };
            frame.src = url;
        }

        function initBackgroundParticles() {
            const container = document.getElementById('soulParticles');
            const colors = ['#00e5ff', '#ff2a6d', '#00ff66', '#ff4500'];
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.floor(Math.random() * 4) + 3;
                particle.className = 'pixel-soul';
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.background = randomColor;
                particle.style.boxShadow = `0 0 8px ${randomColor}`;
                particle.style.animationDuration = `${Math.random() * 8 + 12}s`;
                particle.style.animationDelay = `${Math.random() * -20}s`;
                container.appendChild(particle);
            }
        }

        window.onload = function() { initBackgroundParticles(); };
    </script>
</body>
</html>
